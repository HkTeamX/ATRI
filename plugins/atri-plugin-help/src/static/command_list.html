<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>机器人命令列表</title>
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body>
    <div id="app">
      <div class="command-list">
        <h2>命令列表:</h2>
        <p><%= command_help_info %></p>
        <br />
        <% commands.forEach(function(command) { %>
        <p><%= command.index %>.<%= command.name %>:<%= command.description %></p>
        <% }) %>
        <div class="page-info">第 <%= page %> 页，共 <%= Math.ceil(total / size) %> 页</div>
      </div>
    </div>
  </body>
</html>
